version: '3.8'

services:
  # The Web Server pulls a pre-built image
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../html:/usr/share/nginx/html:ro
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../database:/etc/sqlite/data
    restart: always

  # The Backend builds a custom image using your Dockerfile
  backend:
    build: 
      context: ../java
      dockerfile: Dockerfile
    ports:
      - "8081:8080" # Assuming your Java app runs on 8080
    volumes:
      - ../database:/etc/sqlite/data # Share the database with the backend
    restart: always