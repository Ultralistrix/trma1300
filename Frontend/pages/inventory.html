<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventar — Lagerverwaltung</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
<div class="app-layout">

  <header class="topbar">
    <div class="topbar-brand">
      <div class="logo-icon"></div>
      Lagerverwaltung
    </div>
    <div class="topbar-right">
      <button class="notif-btn" onclick="location.href='inventory.html'">
        Warnungen
        <span class="notif-count hidden" id="notif-count">0</span>
      </button>
    </div>
  </header>

  <nav class="sidebar">
    <div class="sidebar-section-label">Übersicht</div>
    <a class="nav-item" href="dashboard.html"><span class="nav-icon"></span> Dashboard</a>
    <div class="sidebar-section-label">Verwaltung</div>
    <a class="nav-item" href="tasks.html"><span class="nav-icon"></span> Aufgaben</a>
    <a class="nav-item active" href="inventory.html"><span class="nav-icon"></span> Inventar</a>
    <a class="nav-item" href="timeline.html"><span class="nav-icon"></span> Kaufplan</a>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <div class="page-header-left">
        <h1>Inventar</h1>
        <p>Zentrale Datenbank aller Lageritems</p>
      </div>
      <button class="btn-primary" id="btn-add-item">+ Item hinzufügen</button>
    </div>

    <div id="alert-banner"></div>

    <div class="filter-bar">
      <input type="search" id="filter-search" placeholder="Suchen..." style="max-width:220px">
      <select id="filter-category">
        <option value="">Alle Kategorien</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Kategorie</th>
            <th>Wiederverwendbar</th>
            <th>Bestand</th>
            <th>Eiserne Grenze</th>
            <th>Status</th>
            <th>Aktionen</th>
          </tr>
        </thead>
        <tbody id="inv-tbody">
          <tr><td colspan="7" style="text-align:center;color:var(--text3);padding:40px">Wird geladen...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<div id="toast-container"></div>

<script src="../js/store/store.js"></script>
<script src="../js/utils/dom.js"></script>
<script src="../js/features/inventory.js"></script>
</body>
</html>
