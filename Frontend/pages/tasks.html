<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aufgaben — Lagerverwaltung</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
<div class="app-layout">

  <header class="topbar">
    <div class="topbar-brand">
      <div class="logo-icon"></div>
      Lagerverwaltung
    </div>
    <div class="topbar-right">
      <button class="notif-btn" onclick="location.href='inventory.html'">
        Warnungen
        <span class="notif-count hidden" id="notif-count">0</span>
      </button>
    </div>
  </header>

  <nav class="sidebar">
    <div class="sidebar-section-label">Übersicht</div>
    <a class="nav-item" href="dashboard.html"><span class="nav-icon"></span> Dashboard</a>
    <div class="sidebar-section-label">Verwaltung</div>
    <a class="nav-item active" href="tasks.html"><span class="nav-icon"></span> Aufgaben</a>
    <a class="nav-item" href="inventory.html"><span class="nav-icon"></span> Inventar</a>
    <a class="nav-item" href="timeline.html"><span class="nav-icon"></span> Kaufplan</a>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <div class="page-header-left">
        <h1>Aufgaben</h1>
        <p>Alle Aufgaben mit Inventarbedarf und Abhängigkeiten</p>
      </div>
      <button class="btn-primary" id="btn-add-task">+ Neue Aufgabe</button>
    </div>

    <div class="filter-bar">
      <input type="search" id="filter-search" placeholder="Suchen..." style="max-width:220px">
      <select id="filter-priority">
        <option value="">Alle Prioritäten</option>
        <option value="hoch">Hoch</option>
        <option value="mittel">Mittel</option>
        <option value="niedrig">Niedrig</option>
      </select>
    </div>

    <div id="task-list"></div>
  </main>
</div>

<div id="toast-container"></div>

<script src="../js/store/store.js"></script>
<script src="../js/utils/dom.js"></script>
<script src="../js/features/tasks.js"></script>
</body>
</html>
