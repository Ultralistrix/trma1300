user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        # WICHTIG: Nginx lauscht intern auf Port 80. 
        # Docker leitet deinen Aufruf von localhost:8080 auf diese 80 weiter.
        listen 80; 
        server_name localhost;

        # Das ist der Pfad, auf den wir deinen Frontend-Ordner in Docker gemappt haben
        root /usr/share/nginx/html;

        # 1. Regel: Wenn jemand genau das Hauptverzeichnis (/) aufruft -> Weiterleitung zum Dashboard
        location = / {
            return 301 /pages/dashboard.html;
        }

        # 2. Regel: Standardverhalten für alle anderen Dateien (z.B. CSS, JS)
        location / {
            try_files $uri $uri/ =404;
        }

        # Optional: Caching für deine CSS/JS-Dateien, damit die Seite schneller lädt
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }
}